# Automatically use available CPU cores.
worker_processes auto;

events {
  # Maximum simultaneous connections per worker.
  worker_connections 1024;
}

http {
  # MIME types for correct Content-Type headers.
  include      mime.types;
  default_type application/octet-stream;

  # Better file serving for static files.
  sendfile on;
  # Reduce packet overhead for large responses.
  tcp_nopush on;
  # Send small packets immediately (good for APIs / dynamic apps).
  tcp_nodelay on;

  # Keep connections alive for performance.
  keepalive_timeout 75s;
  keepalive_requests 1000;

  # Faster MIME lookup hash table.
  types_hash_max_size 2048;

  # Hide nginx version in error pages / headers.
  server_tokens off;

  # Only modern TLS versions.
  ssl_protocols TLSv1.2 TLSv1.3;
  # Relevant mainly for TLS 1.2.
  ssl_prefer_server_ciphers on;

  # Good defaults for TLS session reuse.
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # Helps select strong elliptic curves automatically.
  ssl_ecdh_curve auto;

  # OCSP stapling (only useful with real public certificates).
  # Uncomment if you use Let's Encrypt or another public CA.
  #
  # ssl_stapling on;
  # ssl_stapling_verify on;
  # resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
  # resolver_timeout 5s;
  #
  # IMPORTANT:
  # If you enable stapling, also set:
  # ssl_trusted_certificate /etc/ssl/fullchain.pem;

  gzip on;
  # insert the “Vary: Accept-Encoding” response header
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  # text/html is always included
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    application/xhtml+xml
    image/svg+xml
    image/x-icon
    font/opentype
    font/truetype
    font/woff
    font/woff2;

  server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # Allow legitimate ACME challenge requests.
    # location ^~ /.well-known/acme-challenge/ {
    #   default_type "text/plain";
    #   root         /var/www/letsencrypt;
    # }
    # Hide /acme-challenge subdirectory and return 404 on all requests.
    # location = /.well-known/acme-challenge/ {
    #   return 404;
    # }

    # Redirect everything else to HTTPS.
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    # Only needed if you enable OCSP stapling:
    # ssl_trusted_certificate /etc/letsencrypt/live/example.com/fullchain.pem;

    # Prevent MIME sniffing.
    add_header X-Content-Type-Options "nosniff" always;
    # Prevent clickjacking.
    add_header X-Frame-Options "DENY" always;
    # Reduce referrer leakage.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Disable dangerous browser features unless needed.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Root directory for serving files
    root /var/www/public;
    index index.html;
    error_page 404 /404.html;

    # Serve files if they exist, otherwise return 404.
    location / {
      try_files $uri $uri/ =404;
    }

    # Serve files in SPA mode (React / Vue / Svelte).
    # location / {
    #   try_files $uri $uri/ /index.html;
    # }

    # Allow .well-known for things like ACME / app links.
    # location ^~ /.well-known/ {
    #   allow all;
    # }

    # Hide dotfiles, except well-known.
    location ~ /\.(?!well-known).* {
      deny all;
    }

    # Block sensitive project files explicitly.
    location ~* \.(env|log|ini|conf|sql|bak|swp|dist)$ {
      deny all;
    }

    # Replace the location / block in the HTTPS server with this if you
    # want nginx to serve files and an app simultaneously:
    # location /api/ {
    #   proxy_pass http://127.0.0.1:3000/;
    #   proxy_http_version 1.1;
    #   proxy_set_header Host $host;
    #   proxy_set_header X-Real-IP $remote_addr;
    #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #   proxy_set_header X-Forwarded-Proto $scheme;
    # }
    #
    # location / {
    #   try_files $uri $uri/ /index.html;
    # }

    # Replace the location / block in the HTTPS server with this if you
    # want nginx to serve files first, then proxy missing requests to an app:
    #
    # location / {
    #   try_files $uri $uri/ @backend;
    # }
    #
    # location @backend {
    #   proxy_pass http://127.0.0.1:3000;
    #   proxy_http_version 1.1;
    #
    #   # Preserve original request info for the backend app.
    #   proxy_set_header Host $host;
    #   proxy_set_header X-Real-IP $remote_addr;
    #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #   proxy_set_header X-Forwarded-Proto $scheme;
    #
    #   # WebSocket support.
    #   proxy_set_header Upgrade $http_upgrade;
    #   proxy_set_header Connection "upgrade";
    # }
  }
}
